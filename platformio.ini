[platformio]
default_envs = esp32c6, stationary, rotating

[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usb*
monitor_port = /dev/cu.usb*

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.0.0

build_src_filter =
    +<*>
    -<main_stationary.cpp>
    -<main_rotating.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    

[env:stationary]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usb*
monitor_port = /dev/cu.usb*

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.0.0

build_src_filter =
    +<*>
    -<main.cpp>
    -<main_rotating.cpp>
    -<hal_spi_leds.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -DCONFIG_ASYNC_TCP_USE_WDT=0

[env:rotating]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usb*
monitor_port = /dev/cu.usb*

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

build_src_filter =
    +<*>
    -<main.cpp>
    -<main_stationary.cpp>
    -<hall_sensor.cpp>
    -<motor.cpp>
    -<web/*>

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -DMAX_BRIGHTNESS_CAP=8

[env:native]
platform = native
test_build_src = true
build_src_filter =
    -<*>
    +<framebuffer.cpp>
    +<canvas.cpp>
    +<patterns/*.cpp>
    +<transforms/*.cpp>
    +<effect.cpp>
    +<effect_nvs.cpp>
    +<settings_registry.cpp>
    +<settings_registry_sim_stub.cpp>
    +<pattern_nvs.cpp>
lib_deps = bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -Itest/stubs
