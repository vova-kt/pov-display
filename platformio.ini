[platformio]
default_envs = esp32c6

[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usb*
monitor_port = /dev/cu.usb*

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.0.0

build_src_filter =
    +<*>
    -<main_stationary.cpp>
    -<main_rotating.cpp>
    -<comm/*>

build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -DNUM_SLICES=360
    -DHW_NUM_LEDS=40
    -DHW_STRIP_REVERSED=0
    -DHW_SPI_CLOCK_MHZ=20
    -DHW_MAX_BRIGHTNESS=16
    -DHW_MAX_RPM=900
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    ; Silence specific log tags at boot (comma-separated quoted strings):
    ; -DLOG_EXCLUDE_TAGS='"scanner","spi"'

[env:native]
platform = native
test_build_src = true
build_src_filter =
    -<*>
    +<framebuffer.cpp>
    +<canvas.cpp>
    +<patterns/*.cpp>
    +<transforms/*.cpp>
    +<effect.cpp>
    +<motor_control.cpp>
    +<effect_nvs.cpp>
    +<settings_registry.cpp>
    +<settings_registry_sim_stub.cpp>
    +<pattern_nvs.cpp>
lib_deps = bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -DNUM_SLICES=360
    -DHW_NUM_LEDS=40
    -DHW_STRIP_REVERSED=0
    -DHW_SPI_CLOCK_MHZ=20
    -DHW_MAX_BRIGHTNESS=31
    -DHW_MAX_RPM=900
    -Itest/stubs
