[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200

lib_deps =
    mathieucarbou/ESPAsyncWebServer @ ^3.6.0
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DMAX_LEDS=144
    -DMAX_SLICES=720

[env:native]
platform = native
test_build_src = true
build_src_filter = -<*> +<framebuffer.cpp> +<canvas.cpp> +<patterns/*.cpp> +<transforms/*.cpp>
build_flags =
    -DMAX_LEDS=144
    -DMAX_SLICES=720
    -Itest/stubs
