<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POV Display Simulator</title>
<script src="js/image-processor.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #111; color: #ccc;
    display: flex; height: 100vh; overflow: hidden;
  }
  #canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    min-width: 0; position: relative;
  }
  #pov-canvas { max-width: 100%; max-height: 100%; }

  #hud {
    position: absolute; top: 10px; right: 10px;
    font-family: 'Consolas', 'SF Mono', 'Menlo', monospace;
    font-size: 14px; line-height: 1.6;
    background: rgba(0,0,0,0.50); padding: 8px 12px; border-radius: 4px;
    pointer-events: none; z-index: 10;
    text-shadow: 0 0 6px rgba(0,255,100,0.25);
    border: 1px solid rgba(0,255,100,0.15);
  }
  #hud .hud-val { color: #0f0; font-weight: bold; }
  #hud .hud-lbl { color: #888; font-size: 11px; }

  #sidebar {
    width: 320px; min-width: 320px;
    background: #1a1a1a; border-left: 1px solid #333;
    overflow-y: auto; padding: 16px;
  }
  .controls-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .controls-row button {
    flex: 1; padding: 6px; background: #333; color: #ccc; border: 1px solid #555;
    cursor: pointer; border-radius: 3px; font-size: 12px;
  }
  .controls-row button:hover { background: #444; }

  /* Settings UI overrides for sim dark theme */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab-btn { padding: 6px 12px; border: 1px solid #444; border-radius: 3px;
    cursor: pointer; background: #222; color: #888; font-size: 12px; }
  .tab-btn.active { background: #2979ff; color: #fff; border-color: #2979ff; }
  .tab-panel.hidden { display: none; }
  .setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .setting-row label { flex: 0 0 100px; font-size: 12px; color: #999; }
  .setting-row input[type=range] { flex: 1; }
  .setting-row select, .setting-row input[type=text] {
    flex: 1; background: #222; color: #ccc; border: 1px solid #444;
    padding: 4px 6px; font-size: 12px; border-radius: 3px; }
  .setting-row input[type=color] { width: 40px; height: 26px; border: 1px solid #444;
    background: none; cursor: pointer; }
  .setting-row .val { flex: 0 0 55px; text-align: right; font-size: 11px; color: #aaa;
    font-variant-numeric: tabular-nums; }
  .setting-row .chk { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .pattern-params.hidden { display: none; }
  .hidden { display: none !important; }
  .setting-row button {
    flex: 1; padding: 5px 8px; margin-bottom: 6px; margin-top: 6px; background: #333; color: #ccc; border: 1px solid #555;
    cursor: pointer; border-radius: 3px; font-size: 12px; }
  .setting-row button:hover { background: #444; }
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="pov-canvas"></canvas>
  <div id="hud">
    <div><span class="hud-val" id="hud-rpm">--</span> <span class="hud-lbl">RPM</span></div>
    <div><span class="hud-val" id="hud-hz">--</span> <span class="hud-lbl">Hz</span></div>
    <div><span class="hud-val" id="hud-fps">--</span> <span class="hud-lbl">FPS</span></div>
    <div><span class="hud-val" id="hud-slice-int">--</span> <span class="hud-lbl">&micro;s/slice</span></div>
    <div><span class="hud-val" id="hud-spi">--</span> <span class="hud-lbl">&micro;s SPI</span></div>
    <div><span class="hud-val" id="hud-headroom">--</span> <span class="hud-lbl">&micro;s headroom</span></div>
    <div><span class="hud-val" id="hud-frame-age">--</span> <span class="hud-lbl">frame age</span></div>
    <div><span class="hud-val" id="hud-pattern-gen">--</span> <span class="hud-lbl">ms pat.gen</span></div>
    <div><span class="hud-val" id="hud-hall-missed">--</span> <span class="hud-lbl">hall miss</span></div>
  </div>
</div>

<div id="sidebar">
  <div id="settings-root"></div>
</div>

<script src="pov_sim.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
